# CI skeleton (doc 00 step 11). mainnet-smoke.yml is defined by module 17 and
# gated on secrets — its canonical CI env names for the record:
#   SMOKE_WALLET_PRIVATE_KEY  — the capped $50 smoke wallet (dev-only exception)
#   CI_DAILY_BUDGET_USD (5) · SMOKE_CONVERT_USD (1)
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      # doc 01: token-pair WCAG ratios (4.5:1 text / 3:1 non-text)
      - run: pnpm contrast
      # doc 01 / G12: banned vocabulary in user copy is a release blocker
      - run: pnpm copy-canon
      # doc 17: the repo is public and docs/ is private strategy — only the
      # four judge-facing files may ever be tracked.
      - run: pnpm check:docs
      # doc 17: the worker ships on tsx, so every bare specifier must be
      # declared by the package that imports it (a hoisted copy resolves here
      # and vanishes on a production install).
      - run: pnpm check:worker-deps

  unit:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: retenix_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/retenix_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:push
      - run: pnpm test

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - run: forge test -vvv
        working-directory: contracts

  # doc 09 (PS-F3-AC1): the 25-utterance intent eval on RECORDED fixtures —
  # deterministic, no model key, no DB. The live-model run is a manual gate
  # before the demo (`pnpm eval:intent --live`); model responses drift, so it
  # is never the CI mode.
  intent-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm eval:intent

  # doc 17 §Test plan: "gitleaks green in CI; a `git log -p | grep`-style history
  # scan finds nothing". Runs the gitleaks BINARY, not gitleaks-action: the CLI
  # is MIT, while the action is EULA-licensed from v2 (free for personal repos,
  # but this repo moving to an org would silently need a license key) and v2 is
  # pinned to Node 20, which GitHub removes from runners on 2026-09-16.
  #
  # `gitleaks git` scans commit DIFFS, so it covers both the full history and
  # everything currently at HEAD. History matters here specifically: on
  # 2026-07-10 this repo was rewritten with filter-repo to purge docs/ and nine
  # root planning files, and this job is the standing proof that worked.
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — a shallow clone scans almost nothing
      - name: install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: history scan
        run: gitleaks git . --config .gitleaks.toml --redact --no-banner

  # doc 17 (PS-8.1): the Vercel preview IS the judge-clickable artifact, so a
  # build break must not first surface on Vercel after merge. `pnpm typecheck`
  # cannot catch bundler-level failures — a server-only import pulled into a
  # client component, a use-client boundary violation, Turbopack resolution —
  # only `next build` can. Env comes from the committed .env.example, which
  # makes this the DoD's ".env.example completeness" check too: add a required
  # var to env.ts and forget the example, and this job goes red naming it.
  # apps/worker's build is `tsc -b` + the runtime-deps guard, run by `lint`.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - name: web env (placeholders from the committed example)
        run: grep -E '^[A-Z_][A-Z0-9_]*=' apps/web/.env.example >> "$GITHUB_ENV"
      - run: pnpm install --frozen-lockfile
      # SENTRY_AUTH_TOKEN is sntrys_PLACEHOLDER here, which next.config.ts reads
      # as "no upload" — this build creates no release and makes no Sentry call.
      - run: pnpm --filter web build

  pins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      # doc 00 step 5 + doc 03 task 1: magic-sdk 33.9.0 in apps/web, UA SDK 2.0.3
      # ONLY in packages/ua. The check reads only package.json (no install), and
      # scripts/check-pins.mjs is the single source of truth (no drift).
      - name: exact pins
        run: node scripts/check-pins.mjs
