# CI skeleton (doc 00 step 11). mainnet-smoke.yml is defined by module 17 and
# gated on secrets — its canonical CI env names for the record:
#   SMOKE_WALLET_PRIVATE_KEY  — the capped $50 smoke wallet (dev-only exception)
#   CI_DAILY_BUDGET_USD (5) · SMOKE_CONVERT_USD (1)
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  unit:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: retenix_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/retenix_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:push
      - run: pnpm test

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - run: forge test -vvv
        working-directory: contracts

  pins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: exact pins (doc 00 step 5, verbatim)
        run: |
          node -e "const w=require('./apps/web/package.json');for(const[k,v]of Object.entries({'@particle-network/universal-account-sdk':'2.0.3','magic-sdk':'33.9.0'})){const d={...w.dependencies,...w.devDependencies};if(d[k]&&d[k]!==v){console.error(k+' must be pinned to '+v);process.exit(1)}}"
