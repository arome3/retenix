# gitleaks config (doc 17 §Test plan — "secrets audit: gitleaks green in CI; a
# git log -p | grep-style history scan finds nothing").
#
# Extends the shipped ruleset rather than replacing it. Every allowlist below is
# narrowed so that a REAL secret in the same file is still caught: either the
# match is an exact published constant, or it is a value shape from which no key
# can be derived, or it requires BOTH a path and a placeholder marker.
#
# Baseline when this landed (gitleaks 8.30.1, 172 commits): 6 findings, all
# verified public constants or placeholders — no credential has ever been
# committed to this repo. Keep it that way; do not add a bare `paths` allowlist.

title = "retenix"

[extend]
useDefault = true

# -----------------------------------------------------------------------------
# 1. EVM addresses. An address is the last 20 bytes of the keccak of a PUBLIC
#    key — publishing one reveals nothing, and this repo is full of them
#    (deployed contracts, USDC, delegates, test fixtures). Bounded to EXACTLY 40
#    hex digits, so a 64-hex private key does not match and is still reported.
# -----------------------------------------------------------------------------
[[allowlists]]
description = "EVM addresses (20 bytes) — public by construction; 64-hex keys still caught"
regexTarget = "match"
regexes = ['''\b0x[0-9a-fA-F]{40}\b''']

# -----------------------------------------------------------------------------
# 2. Solana public keys — ed25519 pubkeys are 32 bytes, i.e. 43-44 base58 chars
#    (xStocks mints, SOL/USDC mints). A base58 SECRET key encodes 64 bytes and
#    runs 87-88 chars, so the upper bound is what keeps this honest.
# -----------------------------------------------------------------------------
[[allowlists]]
description = "Solana pubkeys (32 bytes) — 64-byte secret keys are ~88 chars and still caught"
regexTarget = "match"
regexes = ['''\b[1-9A-HJ-NP-Za-km-z]{43,44}\b''']

# -----------------------------------------------------------------------------
# 3. The anvil deterministic account #0 key. Published verbatim in the Foundry
#    book and burned into every local test fixture. Matched EXACTLY — any other
#    64-hex key in the same files is still a finding.
# -----------------------------------------------------------------------------
[[allowlists]]
description = "anvil deterministic account #0 — a published constant, not a credential"
regexTarget = "match"
regexes = [
  '''0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80''',
]

# -----------------------------------------------------------------------------
# 4. Committed placeholders (.env.example files).
#
#    NOTE, learned the hard way: a `paths` allowlist makes gitleaks skip the
#    matching file WHOLESALE — it never reads the bytes, so pairing it with
#    `condition = "AND"` does NOT give you "only placeholder values in this
#    path". Verified by byte count: adding a paths rule for .env.example dropped
#    the scanned total by exactly that file's size, and a planted real key went
#    undetected. So this matches on the VALUE alone and names no path. The file
#    is still scanned in full; only values that literally announce themselves as
#    placeholders are allowed, which is a property no real credential has.
# -----------------------------------------------------------------------------
[[allowlists]]
description = "self-declaring placeholder values — never a path skip, so real keys are still read"
regexes = [
  '''(?i)placeholder''',
  '''(?i)change-me''',
  '''^0{8}-0{4}-0{4}-0{4}-0{12}$''',
  '''^0x0{40}$''',
]

# -----------------------------------------------------------------------------
# 5. Env-var NAMES sitting next to each other in source, e.g.
#      for (const k of ["G4_KEEPER_PRIVATE_KEY", "G4_CLAIM_DELEGATE"])
#    generic-api-key reads the pair as a key/value. Applied to the captured
#    secret (not the whole match) and bounded to SCREAMING_SNAKE: a real
#    credential is never pure [A-Z0-9_], so no actual key can hide behind this.
# -----------------------------------------------------------------------------
[[allowlists]]
description = "adjacent env-var NAMES misread as a key/value pair"
regexes = ['''^[A-Z][A-Z0-9_]{3,}$''']

# -----------------------------------------------------------------------------
# 6. Vendored + generated artefacts. forge-std is vendored (its .git stripped so
#    a plain clone is judge-runnable); contracts/broadcast holds public deploy
#    receipts whose `input` fields are megabytes of contract bytecode that trips
#    entropy rules. Neither is code we author.
# -----------------------------------------------------------------------------
[[allowlists]]
description = "vendored forge-std and Foundry broadcast receipts"
paths = [
  '''^contracts/lib/forge-std/''',
  '''^contracts/broadcast/''',
  '''^contracts/out/''',
]
